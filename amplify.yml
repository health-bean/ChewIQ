version: 1
applications:
  - appRoot: frontend/web-app
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../shared && npm ci
            - cd ../web-app && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    environment:
      variables:
        VITE_API_BASE_URL: https://suhoxvn8ik.execute-api.us-east-1.amazonaws.com/dev/
