<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILO Health Platform - API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }
        
        body {
            margin: 0;
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
            text-align: center;
            position: relative;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 2rem;
            margin: 0.5rem 0;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
        }
        
        .back-link {
            position: absolute;
            top: 1rem;
            left: 2rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: background 0.3s ease;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .nav-links {
            position: absolute;
            top: 1rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            transition: background 0.3s ease;
            font-size: 0.9rem;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        /* Custom Swagger UI styling */
        .swagger-ui .topbar {
            display: none;
        }
        
        .swagger-ui .info {
            margin: 2rem 0;
        }
        
        .swagger-ui .info .title {
            color: #2d3748;
            font-size: 2rem;
        }
        
        .swagger-ui .info .description {
            color: #4a5568;
            font-size: 1.1rem;
        }
        
        .swagger-ui .scheme-container {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        
        .swagger-ui .opblock.opblock-get {
            border-color: #48bb78;
            background: rgba(72, 187, 120, 0.1);
        }
        
        .swagger-ui .opblock.opblock-post {
            border-color: #4299e1;
            background: rgba(66, 153, 225, 0.1);
        }
        
        .swagger-ui .opblock.opblock-put {
            border-color: #ed8936;
            background: rgba(237, 137, 54, 0.1);
        }
        
        .swagger-ui .opblock.opblock-delete {
            border-color: #f56565;
            background: rgba(245, 101, 101, 0.1);
        }
        
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: #718096;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fed7d7;
            color: #742a2a;
            padding: 1rem;
            border-radius: 8px;
            margin: 2rem;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            
            .back-link, .nav-links {
                position: static;
                margin: 0.5rem;
            }
            
            .nav-links {
                justify-content: center;
                flex-wrap: wrap;
            }
            
            #swagger-ui {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="./" class="back-link">
            ← Back to Hub
        </a>
        <div class="nav-links">
            <a href="./api.html" class="nav-link">API Explorer</a>
            <a href="./dashboard.html" class="nav-link">Dashboard</a>
        </div>
        <h1>API Documentation</h1>
        <p>Complete OpenAPI specification with interactive testing</p>
    </div>
    
    <div id="swagger-ui">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading API documentation...</p>
        </div>
    </div>
    
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            // Try to load the OpenAPI spec
            fetch('./openapi.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(spec => {
                    // Initialize Swagger UI
                    const ui = SwaggerUIBundle({
                        spec: spec,
                        dom_id: '#swagger-ui',
                        deepLinking: true,
                        presets: [
                            SwaggerUIBundle.presets.apis,
                            SwaggerUIStandalonePreset
                        ],
                        plugins: [
                            SwaggerUIBundle.plugins.DownloadUrl
                        ],
                        layout: "StandaloneLayout",
                        tryItOutEnabled: true,
                        requestInterceptor: (request) => {
                            // Add any custom headers or auth here
                            console.log('API Request:', request);
                            return request;
                        },
                        responseInterceptor: (response) => {
                            console.log('API Response:', response);
                            return response;
                        }
                    });
                })
                .catch(error => {
                    console.error('Error loading OpenAPI spec:', error);
                    document.getElementById('swagger-ui').innerHTML = `
                        <div class="error">
                            <h3>⚠️ Unable to load API documentation</h3>
                            <p>Error: ${error.message}</p>
                            <p>The OpenAPI specification file (openapi.json) could not be loaded.</p>
                            <p>This usually means the documentation generator hasn't run yet.</p>
                            <div style="margin-top: 1rem;">
                                <a href="./api.html" style="color: #667eea; text-decoration: none;">
                                    → Try the Interactive API Explorer instead
                                </a>
                            </div>
                        </div>
                    `;
                });
        };
    </script>
</body>
</html>
